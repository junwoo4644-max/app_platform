# Server 1 edge proxy. This is the only container that publishes ports to the
# host -- every app service stays internal-only and gets reached through here.
# That keeps adding a future app a one-block change (see the template below)
# instead of a new host port juggling act, and makes swapping IP-based access
# for a real domain later a change in this file only, not in any app.

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://portal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 8081;
    server_name _;

    location / {
        proxy_pass http://leaf-area-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # leaf_area's own nginx already proxies /api to its backend and needs
        # room for photo uploads / long-running batch recompute requests.
        client_max_body_size 50m;
        proxy_read_timeout 300s;
    }
}

