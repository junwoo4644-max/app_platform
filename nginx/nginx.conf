# Server 1 edge proxy. This is the only container that publishes ports to the
# host -- every app service stays internal-only and gets reached through here.
# That keeps adding a future app a one-block change (see the template below)
# instead of a new host port juggling act.

server {
    listen 80;
    server_name vhslabapps.duckdns.org;

    # Let's Encrypt's HTTP-01 challenge -- needs to stay reachable over plain
    # HTTP even after HTTPS is set up below, so cert renewal keeps working.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vhslabapps.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/vhslabapps.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vhslabapps.duckdns.org/privkey.pem;

    # Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass makes nginx
    # re-resolve "portal" every 10s instead of caching its IP once at startup --
    # without this, redeploying just the portal container (new IP, same nginx)
    # leaves nginx pointing at a dead address until nginx itself is restarted.
    resolver 127.0.0.11 valid=10s;

    location / {
        set $portal_upstream http://portal:3000;
        proxy_pass $portal_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Matches portal/next.config.js's server action body size limit --
        # admin app-registration uploads (zip bundles, thumbnails) go through here.
        client_max_body_size 200m;
        proxy_read_timeout 120s;
    }
}

