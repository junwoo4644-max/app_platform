# Server 1 stack: just the portal for now.
# Only `nginx` publishes ports to the host; every app service is internal-only
# (see nginx/nginx.conf for how requests are routed and how to add a new app).
#
# leaf_area is NOT here -- it's being repackaged as a downloadable local-run
# bundle instead of a hosted service (this tiny instance doesn't have enough
# RAM for its torch/opencv/easyocr pipeline). See leaf_area/README.md.
#
# lot_platform is NOT here either -- it runs on its own server with its own
# compose file (see "lot platform/docker-compose.prod.yml"). The portal
# links to it purely as a URL registered in /admin, no compose wiring needed.

name: app-platform-server1

services:
  portal:
    build: ./portal
    volumes:
      - portal_data:/app/data
    environment:
      DATABASE_URL: file:/app/data/portal.db
      DATA_DIR: /app/data
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - portal
    restart: unless-stopped

  # Renews the Let's Encrypt cert twice a day (certbot no-ops unless it's
  # actually close to expiry). Initial issuance is a one-off command, not this
  # service -- see nginx/README-https.md.
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # ---- 새 앱을 추가할 때 (템플릿, 필요시 복사해서 사용) ----
  # new-app-frontend:
  #   build: ./new-app
  #   restart: unless-stopped

volumes:
  portal_data:
  certbot_conf:
  certbot_www:
